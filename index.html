<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Log | Terminal Interface</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for rendering Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for tactical code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/r.min.js"></script>

    <!-- KaTeX for LaTeX Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- Instagram Embed Script -->
    <script async src="//www.instagram.com/embed.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-deep: #030712;
            --panel-bg: rgba(17, 24, 39, 0.75);
            --border-glow: rgba(255, 255, 255, 0.1);
            --accent-indigo: #818cf8;
            --accent-emerald: #34d399;
            --accent-rose: #fb7185;
        }

        body { 
            background-color: var(--bg-deep); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.03em;
            line-height: 1.8;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .markdown-content h1 { 
            font-size: 2rem; font-weight: 900; margin-top: 2.5rem; margin-bottom: 1.5rem; 
            color: var(--accent-indigo); text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 2px solid rgba(129, 140, 248, 0.2); padding-bottom: 0.5rem;
        }
        .markdown-content h2 { font-size: 1.4rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: var(--accent-emerald); }
        .markdown-content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: #cbd5e1; }
        .markdown-content ul { list-style-type: square; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #94a3b8; }
        .markdown-content pre { 
            background-color: #0f172a !important; padding: 1.25rem; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .markdown-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; }
        .markdown-content blockquote {
            border-left: 4px solid var(--accent-indigo);
            padding-left: 1rem;
            font-style: italic;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        /* Tactical Math Styling */
        .katex { font-size: 1.05em; color: var(--accent-indigo); }
        .katex-display { 
            background: rgba(129, 140, 248, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(129, 140, 248, 0.1);
            margin: 2rem 0;
            overflow-x: auto;
        }

        /* Responsive Iframe & Embed Containers */
        .markdown-content iframe, 
        .markdown-content .instagram-media {
            max-width: 100% !important; 
            border-radius: 12px !important; 
            margin: 1.5rem auto !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
        }

        .nav-active { 
            background-color: rgba(129, 140, 248, 0.15); 
            color: var(--accent-indigo) !important;
            border-left: 3px solid var(--accent-indigo);
        }

        .external-link::after { content: ' ↗'; font-size: 0.8em; opacity: 0.5; }
        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-indigo); }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <script>
        const SITE_CONFIG = {
            profile: {
                name: "Thanakorn Jaemthaworn",
                subtitle: "Veterinarian & Network Biologist",
                photo: "https://media.licdn.com/dms/image/v2/D4E03AQH305GXRLK9UA/profile-displayphoto-scale_400_400/B4EZy7gbjQGoAk-/0/1772672384255?e=1774483200&v=beta&t=JODfmag6O0dIRrTTvmJUUL81IYX7Wn5wh8C59vXCI1w"
            },
            navigation: [
                { 
                    label: "Learning Log", 
                    subpages: [
                        { id: "FBlog", label: "FB status: PCA", file: "log/log1_PCA.md" },
                        { id: "IGlog", label: "Steet Photos", file: "log/IG.md" }
                    ]
                },
                { 
                    label: "LivingNetworks: Blog", 
                    subpages: [
                        { id: "Blog_1", label: "Scale Free", file: "livingNet/scaleFree.md" },
                        { id: "Blog_2", label: "Small world (TBC)", file: "livingNet/smallWorld.md" }
                    ]
                },
                { 
                    label: "Research", 
                    subpages: [
                        { id: "GS", label: "Gene selection", file: "research/GS.md" },
                        { id: "NR", label: "Network representation", file: "research/NR.md" },
                        { id: "Discord", label: "Discordance", file: "research/Discord.md", type: "link" }
                    ]
                },
                {
                    label: "Simulators",
                    subpages: [
                        { id: "sim_intro", label: "Introduction", file: "sim/code.md" }, 
                        { 
                            label: "Landscape", 
                            subpages: [
                                { id: "sim_land_readme", label: "📖 README", file: "sim/sim_land/readme_landscape.md" },
                                { id: "sim_land_techreport", label: "🔧 Technical Report", file: "sim/sim_land/technical_report.md" },
                                { id: "sim_landscape", label: "🌐 Landscape Sim (3D)", file: "sim/sim_land/landscape_sim.html", type: "link" }
                            ]
                        },
                        { 
                            label: "Small-World", 
                            subpages: [
                                { id: "sim_sw_readme", label: "📖 README", file: "sim/sim_sw/readme.md" },
                                { id: "sim_sw_techreport", label: "🔧 Technical Report", file: "sim/sim_sw/technicalRep.md" },
                                { id: "sim_sw_landscape", label: "🌐 Small-World Network Sim", file: "sim/sim_sw/smallWorldSim.html", type: "link" }
                            ]
                        }
                    ]
                },
                { id: "code", label: "R Code Snippets", file: "content/code.md" }
            ]
        };
    </script>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-72 flex-shrink-0 p-4">
            <div class="glass-panel rounded-2xl p-6 md:sticky md:top-6 h-full md:h-[calc(100vh-3rem)] overflow-y-auto">
                <div class="text-center md:text-left mb-10">
                    <div class="relative w-24 h-24 mx-auto md:mx-0 mb-4">
                        <img id="profile-img" src="" alt="Profile" class="w-full h-full rounded-2xl object-cover border border-white/10">
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 border-slate-900 animate-pulse"></div>
                    </div>
                    <h1 id="profile-name" class="text-lg font-black text-white tracking-tight uppercase"></h1>
                    <p id="profile-subtitle" class="text-[10px] text-indigo-400 font-bold uppercase tracking-[0.2em] mt-1"></p>
                </div>
                
                <nav id="nav-menu" class="flex flex-col space-y-1"></nav>

                <div class="mt-auto pt-8 border-t border-white/5">
                    <div class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">System Status: Nominal</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-6 lg:p-8">
            <div class="glass-panel rounded-2xl min-h-full p-8 md:p-12 lg:p-16 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-rose-500/5 rounded-full blur-3xl -ml-32 -mb-32"></div>
                <div id="content-area" class="markdown-content max-w-4xl mx-auto relative z-10"></div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('profile-name').textContent = SITE_CONFIG.profile.name;
            document.getElementById('profile-subtitle').textContent = SITE_CONFIG.profile.subtitle;
            document.getElementById('profile-img').src = SITE_CONFIG.profile.photo;

            const navMenu = document.getElementById('nav-menu');
            const contentArea = document.getElementById('content-area');
            
            let defaultItem = SITE_CONFIG.navigation[0];
            while (defaultItem.subpages) { defaultItem = defaultItem.subpages[0]; }

            async function renderPage(item) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if(btn.dataset.id === item.id && item.type !== 'link') {
                        btn.classList.add('nav-active');
                    } else {
                        btn.classList.remove('nav-active');
                    }
                });

                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 space-y-4">
                        <div class="w-8 h-8 border-2 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin"></div>
                        <p class='text-indigo-400/50 font-mono text-xs uppercase tracking-[0.3em]'>Fetching Core Data...</p>
                    </div>
                `;

                try {
                    const response = await fetch(item.file);
                    if (!response.ok) throw new Error(`Could not load ${item.file}`);
                    const rawMarkdown = await response.text();
                    
                    // Render Markdown
                    contentArea.innerHTML = marked.parse(rawMarkdown);

                    // Re-highlight Code
                    document.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });

                    // Re-render LaTeX Math
                    if (typeof renderMathInElement === 'function') {
                        renderMathInElement(contentArea, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    }

                    // Process Instagram Embeds
                    if (window.instgrm) {
                        window.instgrm.Embeds.process();
                    }

                } catch (error) {
                    contentArea.innerHTML = `
                        <div class="glass-panel border-rose-500/30 bg-rose-500/5 p-8 rounded-xl">
                            <h3 class="text-rose-400 font-black uppercase tracking-widest flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                Data Retrieval Failure
                            </h3>
                            <p class="text-slate-400 mt-4 font-mono text-sm leading-relaxed">Path: <code>${item.file}</code> not found.</p>
                        </div>
                    `;
                }
            }

            function createNavButton(item) {
                const btn = document.createElement('button');
                btn.textContent = item.label;
                btn.dataset.id = item.id;
                btn.className = "nav-btn text-left px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-white hover:bg-white/5 w-full flex items-center justify-between group";
                if (item.type === 'link') btn.classList.add('external-link');
                btn.addEventListener('click', () => {
                    if (item.type === 'link') { window.open(item.file, '_blank'); return; }
                    renderPage(item);
                    if(window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                return btn;
            }

            function buildMenu(menuItems, parentContainer, depth = 0) {
                menuItems.forEach(item => {
                    if (item.subpages) {
                        const details = document.createElement('details');
                        details.className = "mb-2 group";
                        const summary = document.createElement('summary');
                        summary.className = (depth === 0) ? 
                            "cursor-pointer font-black text-slate-500 uppercase tracking-[0.2em] text-[10px] px-4 py-3 hover:text-indigo-400 transition-colors flex justify-between items-center" : 
                            "cursor-pointer font-bold text-slate-400 text-xs px-4 py-2 mb-1 hover:text-white transition-colors bg-white/5 rounded-xl border border-white/5 flex justify-between items-center";
                        summary.innerHTML = `<span>${item.label}</span> <span class="text-[8px] opacity-30 transform group-open:rotate-180 transition-transform">▼</span>`;
                        details.appendChild(summary);
                        const subContainer = document.createElement('div');
                        subContainer.className = "flex flex-col space-y-1 border-l border-white/10 ml-5 pl-2 my-1";
                        buildMenu(item.subpages, subContainer, depth + 1);
                        details.appendChild(subContainer);
                        parentContainer.appendChild(details);
                    } else {
                        parentContainer.appendChild(createNavButton(item));
                    }
                });
            }

            buildMenu(SITE_CONFIG.navigation, navMenu);
            renderPage(defaultItem);
        });
    </script>
</body>
</html>
