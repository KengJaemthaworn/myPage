<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Research Log</title>
    
    <!-- Tailwind CSS for clean, readable styling (Dyslexia-friendly spacing) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for rendering Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for R code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/r.min.js"></script>

    <style>
        /* Dyslexia-friendly typography adjustments */
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; letter-spacing: 0.025em; line-height: 1.75; }
        .markdown-content h1 { font-size: 2.25rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #1f2937; }
        .markdown-content h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #374151; }
        .markdown-content p { margin-bottom: 1.25rem; font-size: 1.125rem; color: #4b5563; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; color: #4b5563; }
        .markdown-content pre { background-color: #1f2937; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.25rem; }
        .markdown-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; }
        .nav-active { background-color: #e5e7eb; font-weight: 600; color: #111827; }
        
        /* Add a small icon class for external links */
        .external-link::after {
            content: ' ↗';
            font-size: 0.8em;
            color: #888;
        }

        /* Hide the default marker for summary so we can make our own arrow */
        details > summary {
            list-style: none;
            outline: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- 
    ========================================================================
    EDIT YOUR CONFIGURATION HERE
    This is the ONLY part of this file you need to change.
    ========================================================================
    -->
    <script>
        const SITE_CONFIG = {
            profile: {
                name: "Thanakorn (Keng) Jaemthaworn",
                subtitle: "Veterinarian & Network Biologist",
                photo: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=400&h=400" 
            },

            // Link to your separate .md files here
            navigation: [
                { 
                    label: "Learning Log", 
                    subpages: [
                        { id: "log_day1", label: "Day 1: The Divergence", file: "Log/log_day1.md" },
                        { id: "log_day2", label: "Day 2: Wiring the Graph", file: "Log/log_day2.md" }
                    ]
                },
                { 
                    label: "LivingNetworks: Blog", 
                    subpages: [
                        { id: "Blog_1", label: "Small world", file: "LivingNetworks/smallworld.md" },
                        { id: "Blog_2", label: "Scale free", file: "LivingNetworks/scalefree.md" }
                    ]
                },
                { 
                    label: "Research", 
                    subpages: [
                        { id: "GS", label: "Gene selection", file: "research/GS.md" },
                        { id: "NR", label: "Network representation", file: "research/NR.md" },
                        { id: "Discord", label: "Discordance", file: "research/Discord.md", type: "link" }
                    ]
                },
                // --- Grouped Simulators under a main "Simulators" dropdown ---
                {
                    label: "Simulators",
                    subpages: [
                        { 
                            label: "Landscape", 
                            subpages: [
                                { id: "sim_land_readme", label: "📖 README", file: "sim_land/readme_landscape.md" },
                                { id: "sim_land_techreport", label: "🔧 Technical Report", file: "sim_land/technical_report.md" },
                                { id: "sim_landscape", label: "🌐 Landscape Sim (3D)", file: "sim_land/landscape_sim.html", type: "link" }
                            ]
                        },
                        { 
                            label: "Small-World", 
                            subpages: [
                                { id: "sim_sw_readme", label: "📖 README", file: "sim_sw/readme.md" },
                                { id: "sim_sw_techreport", label: "🔧 Technical Report", file: "sim_sw/technicalRep.md" },
                                { id: "sim_sw_landscape", label: "🌐 Small-World Network Sim", file: "sim_sw/smallWorldSim.html", type: "link" }
                            ]
                        }
                    ]
                },
                // -------------------------------------------------------------
                { id: "code", label: "R Code Snippets", file: "content/code.md" }
            ]
        };
    </script>
    <!-- ======================================================================== -->

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 flex-shrink-0">
            <div class="p-6 md:sticky md:top-0">
                <div class="text-center md:text-left mb-8">
                    <img id="profile-img" src="" alt="Profile" class="w-24 h-24 rounded-full mx-auto md:mx-0 object-cover mb-4 border-2 border-gray-200">
                    <h1 id="profile-name" class="text-xl font-bold text-gray-900"></h1>
                    <p id="profile-subtitle" class="text-sm text-gray-500 font-medium mt-1"></p>
                </div>
                <nav id="nav-menu" class="flex flex-row md:flex-col space-x-2 md:space-x-0 md:space-y-2 overflow-x-auto pb-4 md:pb-0">
                    <!-- Buttons are injected here automatically -->
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-6 md:p-12 lg:p-16 bg-gray-50">
            <div class="max-w-3xl mx-auto bg-white p-8 md:p-12 shadow-sm rounded-xl border border-gray-100">
                <div id="content-area" class="markdown-content">
                    <!-- Markdown content will load here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Application Logic for loading files -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('profile-name').textContent = SITE_CONFIG.profile.name;
            document.getElementById('profile-subtitle').textContent = SITE_CONFIG.profile.subtitle;
            document.getElementById('profile-img').src = SITE_CONFIG.profile.photo;

            const navMenu = document.getElementById('nav-menu');
            const contentArea = document.getElementById('content-area');
            
            // Find the first default item to load (must handle deep nesting)
            let defaultItem = SITE_CONFIG.navigation[0];
            while (defaultItem.subpages) {
                defaultItem = defaultItem.subpages[0];
            }

            async function renderPage(item) {
                // Highlight the active button
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    // Don't highlight external links
                    if(btn.dataset.id === item.id && item.type !== 'link') {
                        btn.classList.add('nav-active', 'bg-gray-100', 'text-gray-900');
                        btn.classList.remove('text-gray-600', 'hover:bg-gray-50');
                    } else {
                        btn.classList.remove('nav-active', 'bg-gray-100', 'text-gray-900');
                        btn.classList.add('text-gray-600', 'hover:bg-gray-50');
                    }
                });

                contentArea.innerHTML = "<p class='text-gray-500 animate-pulse'>Loading research notes...</p>";

                try {
                    // This fetches your external .md files
                    const response = await fetch(item.file);
                    if (!response.ok) throw new Error(`Could not load ${item.file}`);
                    
                    const rawMarkdown = await response.text();
                    contentArea.innerHTML = marked.parse(rawMarkdown);

                    // Applies R code highlighting
                    document.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                } catch (error) {
                    contentArea.innerHTML = `
                        <div class="bg-red-50 border-l-4 border-red-500 p-4">
                            <h3 class="text-red-800 font-bold">Error Loading File</h3>
                            <p class="text-red-700 mt-2">Could not find <code>${item.file}</code>.</p>
                            <p class="text-red-700 mt-2 text-sm"><strong>Note:</strong> If you are testing this locally or in a preview window, the browser blocks dynamic file loading for security, or the file doesn't exist yet. It will work perfectly once pushed to GitHub Pages!</p>
                        </div>
                    `;
                }
            }

            function createNavButton(item) {
                const btn = document.createElement('button');
                btn.textContent = item.label;
                btn.dataset.id = item.id;
                // Kept your exact classes
                btn.className = "nav-btn text-left px-4 py-2 rounded-lg text-sm md:text-base font-medium transition-colors whitespace-nowrap md:whitespace-normal w-full";
                
                // Add a small arrow indicator if it's an external link
                if (item.type === 'link') {
                    btn.classList.add('external-link');
                }
                
                btn.addEventListener('click', () => {
                    // IF IT IS A LINK: Open in new tab and stop the function
                    if (item.type === 'link') {
                        window.open(item.file, '_blank');
                        return; 
                    }
                    
                    // IF IT IS MARKDOWN: Render as normal
                    renderPage(item);
                    if(window.innerWidth < 768) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
                return btn;
            }

            // RECURSIVE FUNCTION to build nested menus infinitely deep
            function buildMenu(menuItems, parentContainer, depth = 0) {
                menuItems.forEach(item => {
                    if (item.subpages) {
                        // Create the <details> block
                        const details = document.createElement('details');
                        // ลบคำสั่ง details.open = true; ออก เพื่อให้เมนูทั้งหมดพับเก็บเป็นค่าเริ่มต้น
                        
                        // Margin logic depending on depth
                        details.className = (depth === 0) ? "mb-3 group" : "mb-2 mt-1 group";

                        // Create the summary (clickable header)
                        const summary = document.createElement('summary');
                        summary.textContent = item.label;
                        
                        // Styling logic depending on depth (Root level vs Sub level)
                        if (depth === 0) {
                            summary.className = "cursor-pointer font-bold text-gray-400 uppercase tracking-wider text-xs px-2 mb-2 hover:text-gray-600 transition-colors flex justify-between items-center";
                        } else {
                            // Sub-level header style (Dyslexia friendly visual differentiation)
                            summary.className = "cursor-pointer font-semibold text-gray-600 text-sm px-2 py-1 mb-1 hover:text-gray-900 transition-colors bg-gray-50 rounded-md border border-gray-100 flex justify-between items-center";
                        }
                        
                        // Add the rotating arrow
                        summary.innerHTML += `<span class="text-gray-400 text-xs transform group-open:rotate-180 transition-transform">▼</span>`;
                        details.appendChild(summary);

                        // Container for the sub-items
                        const subContainer = document.createElement('div');
                        subContainer.className = "flex flex-col space-y-1 border-l-2 border-gray-100 ml-3 pl-2";

                        // !!! Recursion happens here !!!
                        buildMenu(item.subpages, subContainer, depth + 1);

                        details.appendChild(subContainer);
                        parentContainer.appendChild(details);

                    } else {
                        // It is a clickable button/link
                        const btn = createNavButton(item);
                        if (depth === 0) btn.classList.add('mb-2'); // Margin if at root level
                        parentContainer.appendChild(btn);
                    }
                });
            }

            // Start building the menu from the configuration
            buildMenu(SITE_CONFIG.navigation, navMenu);

            // Load the first page on startup
            renderPage(defaultItem);
        });
    </script>
</body>
</html>
