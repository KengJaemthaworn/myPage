<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Transition Simulator Pro</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons (Replaces lucide-react) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to compile JSX on the fly in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <!-- React will mount here -->
    <div id="root"></div>

    <!-- The actual React App code -->
    <script type="text/babel">
        // 1. Extract React hooks from the global window object
        const { useState, useRef, useEffect, useMemo } = React;

        // --- Configuration & Maps ---
        const NODE_COLORS = {
          red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e',
          blue: '#3b82f6', purple: '#a855f7', black: '#1e293b', white: '#ffffff'
        };

        const NODE_BORDER_COLORS = {
          red: '#b91c1c', orange: '#c2410c', yellow: '#a16207', green: '#15803d',
          blue: '#1d4ed8', purple: '#6b21a8', black: '#020617', white: '#94a3b8'
        };

        const EDGE_COLORS = {
          'dark red': '#7f1d1d', red: '#ef4444', 'light red': '#fca5a5',
          white: '#e2e8f0', 
          'light blue': '#bae6fd', blue: '#3b82f6', 'dark blue': '#1e3a8a'
        };

        const WEIGHT_MAP = {
          'dark red': -1, red: -0.7, 'light red': -0.3,
          white: 0,
          'light blue': 0.3, blue: 0.7, 'dark blue': 1
        };

        const NODE_SHAPES = ['circle', 'rectangle', 'triangle', 'diamond'];
        const EDGE_STYLES = ['normal', 'dot', 'arrow normal', 'arrow dot'];

        // 2. Define the main App component
        function App() {
          const [nodes, setNodes] = useState([]);
          const [edges, setEdges] = useState([]);
          const [selection, setSelection] = useState({ type: null, id: null });
          
          const [defaultNode, setDefaultNode] = useState({ shape: 'circle', color: 'blue' });
          const [defaultEdge, setDefaultEdge] = useState({ thickness: 3, style: 'normal', color: 'dark blue' });

          const [dragState, setDragState] = useState({ id: null, isDragging: false, startX: 0, startY: 0 });
          const [bottomTab, setBottomTab] = useState('matrix'); 
          const svgRef = useRef(null);

          // --- Core Interactions ---
          const handleSvgPointerDown = (e) => {
            if (e.target.tagName === 'svg') setDragState({ id: 'bg', isDragging: false, startX: e.clientX, startY: e.clientY });
          };

          const handleSvgPointerMove = (e) => {
            if (!dragState.id) return;
            const dx = Math.abs(e.clientX - dragState.startX);
            const dy = Math.abs(e.clientY - dragState.startY);
            if (!dragState.isDragging && (dx > 3 || dy > 3)) setDragState(prev => ({ ...prev, isDragging: true }));

            if (dragState.isDragging && dragState.id !== 'bg' && svgRef.current) {
              const rect = svgRef.current.getBoundingClientRect();
              const x = e.clientX - rect.left;
              const y = e.clientY - rect.top;
              setNodes(nodes.map(n => n.id === dragState.id ? { ...n, x, y } : n));
            }
          };

          const handleSvgPointerUp = (e) => {
            if (dragState.id === 'bg' && !dragState.isDragging && e.target.tagName === 'svg') {
              const rect = svgRef.current.getBoundingClientRect();
              const newNode = {
                id: nodes.length > 0 ? Math.max(...nodes.map(n => n.id)) + 1 : 1,
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top,
                shape: defaultNode.shape,
                color: defaultNode.color
              };
              newNode.label = `V${newNode.id}`;
              setNodes([...nodes, newNode]);
              setSelection({ type: null, id: null });
            }
            setDragState({ id: null, isDragging: false, startX: 0, startY: 0 });
          };

          const handleNodePointerDown = (e, nodeId) => {
            e.stopPropagation();
            setDragState({ id: nodeId, isDragging: false, startX: e.clientX, startY: e.clientY });
          };

          const handleNodePointerUp = (e, nodeId) => {
            e.stopPropagation();
            if (dragState.id === nodeId && !dragState.isDragging) handleNodeClickLogic(nodeId);
            setDragState({ id: null, isDragging: false, startX: 0, startY: 0 });
          };

          const handleNodeClickLogic = (nodeId) => {
            if (selection.type === null || selection.type === 'edge') {
              setSelection({ type: 'node', id: nodeId });
            } else if (selection.type === 'node' && selection.id !== nodeId) {
              const edgeId = `e-${selection.id}-${nodeId}`;
              const reverseEdgeId = `e-${nodeId}-${selection.id}`;
              const existingEdgeIndex = edges.findIndex(e => e.id === edgeId || e.id === reverseEdgeId);
              
              if (existingEdgeIndex >= 0) {
                const newEdges = [...edges];
                newEdges[existingEdgeIndex] = { ...newEdges[existingEdgeIndex], source: selection.id, target: nodeId, thickness: defaultEdge.thickness, style: defaultEdge.style, color: defaultEdge.color };
                setEdges(newEdges);
              } else {
                setEdges([...edges, { id: edgeId, source: selection.id, target: nodeId, thickness: defaultEdge.thickness, style: defaultEdge.style, color: defaultEdge.color }]);
              }
              setSelection({ type: null, id: null });
            } else if (selection.type === 'node' && selection.id === nodeId) {
              setSelection({ type: null, id: null });
            }
          };

          const handleEdgeClick = (e, edgeId) => {
            e.stopPropagation();
            setSelection({ type: 'edge', id: edgeId });
          };

          const deleteSelected = () => {
            if (selection.type === 'node') {
              setNodes(nodes.filter(n => n.id !== selection.id));
              setEdges(edges.filter(e => e.source !== selection.id && e.target !== selection.id));
            } else if (selection.type === 'edge') {
              setEdges(edges.filter(e => e.id !== selection.id));
            }
            setSelection({ type: null, id: null });
          };

          const clearNetwork = () => { setNodes([]); setEdges([]); setSelection({ type: null, id: null }); };

          const updateSelectedOrBrush = (type, key, value) => {
            if (selection.type === 'node' && type === 'node') setNodes(nodes.map(n => n.id === selection.id ? { ...n, [key]: value } : n));
            else if (selection.type === 'edge' && type === 'edge') setEdges(edges.map(e => e.id === selection.id ? { ...e, [key]: value } : e));
            else {
              if (type === 'node') setDefaultNode(prev => ({ ...prev, [key]: value }));
              if (type === 'edge') setDefaultEdge(prev => ({ ...prev, [key]: value }));
            }
          };

          const currentProps = () => {
            if (selection.type === 'node') return { node: nodes.find(n => n.id === selection.id), edge: defaultEdge, editing: 'node' };
            if (selection.type === 'edge') return { node: defaultNode, edge: edges.find(e => e.id === selection.id), editing: 'edge' };
            return { node: defaultNode, edge: defaultEdge, editing: null };
          };

          const { node: activeNodeProps, edge: activeEdgeProps, editing } = currentProps();

          // --- Calculations & Matrix ---
          const getAdjacencyMatrix = () => {
            const size = nodes.length;
            let matrix = Array(size).fill(0).map(() => Array(size).fill(0));
            const idToIndex = {};
            nodes.forEach((n, i) => { idToIndex[n.id] = i; });

            edges.forEach(edge => {
              const u = idToIndex[edge.source];
              const v = idToIndex[edge.target];
              if (u === undefined || v === undefined) return;
              const weight = WEIGHT_MAP[edge.color];
              const isDirected = edge.style.includes('arrow');

              matrix[u][v] = weight;
              if (!isDirected) matrix[v][u] = weight; 
            });
            return matrix;
          };

          const adjMatrix = useMemo(() => getAdjacencyMatrix(), [nodes, edges]);

          // --- Centrality Algorithms (Topological Approximation) ---
          const getCentralityMetrics = () => {
            const N = nodes.length;
            if (N === 0) return [];

            const adj = adjMatrix.map(row => row.map(val => val !== 0 ? 1 : 0));
            const hasDirectedEdges = edges.some(e => e.style.includes('arrow'));

            let inDeg = Array(N).fill(0);
            let outDeg = Array(N).fill(0);
            for(let i=0; i<N; i++) {
              for(let j=0; j<N; j++) {
                if(adj[i][j] > 0) { outDeg[i]++; inDeg[j]++; }
              }
            }

            let dist = Array(N).fill(0).map(() => Array(N).fill(Infinity));
            let paths = Array(N).fill(0).map(() => Array(N).fill(0)); 
            for(let i=0; i<N; i++) { dist[i][i] = 0; paths[i][i] = 1; }
            for(let u=0; u<N; u++) {
              for(let v=0; v<N; v++) {
                if (adj[u][v] > 0) { dist[u][v] = 1; paths[u][v] = 1; }
              }
            }
            for(let k=0; k<N; k++) {
              for(let i=0; i<N; i++) {
                for(let j=0; j<N; j++) {
                  if (dist[i][k] + dist[k][j] < dist[i][j]) {
                    dist[i][j] = dist[i][k] + dist[k][j];
                    paths[i][j] = paths[i][k] * paths[k][j];
                  } else if (dist[i][k] + dist[k][j] === dist[i][j] && dist[i][k] !== Infinity) {
                    paths[i][j] += paths[i][k] * paths[k][j];
                  }
                }
              }
            }

            let closeness = Array(N).fill(0);
            let betweenness = Array(N).fill(0);
            
            for(let i=0; i<N; i++) {
              let sumDist = 0; let reachable = 0;
              for(let j=0; j<N; j++) {
                if(dist[i][j] !== Infinity && i !== j) { sumDist += dist[i][j]; reachable++; }
              }
              closeness[i] = sumDist > 0 ? (reachable) / sumDist : 0;
            }

            for(let s=0; s<N; s++) {
              for(let t=0; t<N; t++) {
                if (s===t || dist[s][t] === Infinity) continue;
                for(let v=0; v<N; v++) {
                  if (v===s || v===t) continue;
                  if (dist[s][v] + dist[v][t] === dist[s][t]) {
                    betweenness[v] += (paths[s][v] * paths[v][t]) / paths[s][t];
                  }
                }
              }
            }
            if (!hasDirectedEdges) betweenness = betweenness.map(b => b / 2);

            let clustering = Array(N).fill(0);
            for(let i=0; i<N; i++) {
              let neighbors = [];
              for(let j=0; j<N; j++) { if(adj[i][j] > 0 || adj[j][i] > 0) neighbors.push(j); } 
              let k = neighbors.length;
              if (k < 2) continue;
              let links = 0;
              for(let x=0; x<k; x++) {
                for(let y=0; y<k; y++) {
                  if (x!==y && adj[neighbors[x]][neighbors[y]] > 0) links++;
                }
              }
              clustering[i] = links / (k * (k - 1));
            }

            let eigen = Array(N).fill(1);
            for(let iter=0; iter<20; iter++) {
              let nextEigen = Array(N).fill(0);
              let norm = 0;
              for(let i=0; i<N; i++) {
                for(let j=0; j<N; j++) {
                  if(adj[i][j] > 0) nextEigen[i] += eigen[j]; 
                }
                norm += nextEigen[i] * nextEigen[i];
              }
              norm = Math.sqrt(norm) || 1;
              eigen = nextEigen.map(val => val / norm);
            }

            return nodes.map((node, i) => ({
              ...node,
              inDeg: inDeg[i],
              outDeg: outDeg[i],
              totalDeg: hasDirectedEdges ? inDeg[i] + outDeg[i] : inDeg[i], 
              closeness: closeness[i],
              betweenness: betweenness[i],
              clustering: clustering[i],
              eigen: eigen[i]
            }));
          };

          const centralityData = useMemo(() => getCentralityMetrics(), [nodes, edges, adjMatrix]);

          // --- Exports (CSV, R, Images) ---
          const exportMatrixCSV = () => {
            if (nodes.length === 0) return;
            let csv = "Node," + nodes.map(n => `V${n.id}`).join(",") + "\n";
            adjMatrix.forEach((row, i) => {
              csv += `V${nodes[i].id},` + row.join(",") + "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "adjacency_matrix.csv";
            link.click();
            URL.revokeObjectURL(url);
          };

          const exportCentralityCSV = () => {
            if (nodes.length === 0) return;
            let csv = "Node,In-Deg,Out-Deg,Total Deg,Closeness,Betweenness,Eigenvector,Clustering\n";
            centralityData.forEach(node => {
              csv += `V${node.id},${node.inDeg},${node.outDeg},${node.totalDeg},${node.closeness.toFixed(3)},${node.betweenness.toFixed(3)},${node.eigen.toFixed(3)},${node.clustering.toFixed(3)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "centrality_metrics.csv";
            link.click();
            URL.revokeObjectURL(url);
          };

          const generateRCode = () => {
            if (nodes.length === 0) return "# Stamp nodes to generate code...";
            let code = `library(igraph)\n\n`;
            code += `# 1. Define Adjacency Matrix directly from your visual sandbox\n`;
            code += `adj_matrix <- matrix(c(\n`;
            const rows = adjMatrix.map(row => `  ${row.join(', ')}`);
            code += rows.join(',\n') + `\n), nrow=${nodes.length}, byrow=TRUE)\n\n`;
            code += `rownames(adj_matrix) <- paste0("V", c(${nodes.map(n=>n.id).join(',')}))\n`;
            code += `colnames(adj_matrix) <- paste0("V", c(${nodes.map(n=>n.id).join(',')}))\n\n`;
            code += `# 2. Create Graph from Matrix\n`;
            code += `g <- graph_from_adjacency_matrix(adj_matrix, mode="directed", weighted=TRUE, diag=FALSE)\n\n`;
            code += `# 3. Apply Node Aesthetics\n`;
            code += `V(g)$color <- c(${nodes.map(n => `"${n.color}"`).join(', ')})\n`;
            const igraphShapes = nodes.map(n => n.shape === 'circle' ? '"circle"' : n.shape === 'rectangle' ? '"square"' : '"csquare"');
            code += `V(g)$shape <- c(${igraphShapes.join(', ')})\n\n`;
            code += `# Plotting\n`;
            code += `plot(g, edge.width=abs(E(g)$weight)*5, edge.color=ifelse(E(g)$weight < 0, "red", "blue"), vertex.size=25, main="NSS/GXS Simulation")`;
            return code;
          };

          const exportSVG = () => {
            if (!svgRef.current) return;
            const svgData = new XMLSerializer().serializeToString(svgRef.current);
            const svgWithXmlns = svgData.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
            const blob = new Blob([svgWithXmlns], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.href = url; link.download = "network_simulation.svg"; link.click(); URL.revokeObjectURL(url);
          };

          const exportPNG = () => {
            if (!svgRef.current) return;
            const svgEl = svgRef.current;
            const width = svgEl.clientWidth || 800; const height = svgEl.clientHeight || 600;
            svgEl.setAttribute('width', width); svgEl.setAttribute('height', height);
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const svgWithXmlns = svgData.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
            svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
            const img = new Image(); img.crossOrigin = "anonymous";
            img.onload = () => {
              const canvas = document.createElement("canvas"); canvas.width = width; canvas.height = height; const ctx = canvas.getContext("2d");
              ctx.fillStyle = "#f8fafc"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0);
              const link = document.createElement("a"); link.href = canvas.toDataURL("image/png"); link.download = "network_simulation.png"; link.click();
            };
            img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgWithXmlns)));
          };

          const renderShape = (x, y, shape, color, isSelected) => {
            const fill = NODE_COLORS[color] || color;
            const baseStroke = NODE_BORDER_COLORS[color] || '#475569';
            const stroke = isSelected ? '#111827' : baseStroke; 
            const strokeW = isSelected ? 4 : 2;
            const size = 20;

            switch (shape) {
              case 'rectangle': return <rect x={x - size} y={y - size} width={size * 2} height={size * 2} fill={fill} stroke={stroke} strokeWidth={strokeW} rx="4" />;
              case 'triangle': return <polygon points={`${x},${y - size - 4} ${x - size - 2},${y + size - 2} ${x + size + 2},${y + size - 2}`} fill={fill} stroke={stroke} strokeWidth={strokeW} strokeLinejoin="round" />;
              case 'diamond': return <polygon points={`${x},${y - size - 4} ${x - size - 4},${y} ${x},${y + size + 4} ${x + size + 4},${y}`} fill={fill} stroke={stroke} strokeWidth={strokeW} strokeLinejoin="round" />;
              case 'circle': default: return <circle cx={x} cy={y} r={size} fill={fill} stroke={stroke} strokeWidth={strokeW} />;
            }
          };

          return (
            <div className="flex flex-col min-h-screen font-sans p-4 max-w-7xl mx-auto">
              <div className="w-full mb-4">
                <h1 className="text-2xl font-bold text-slate-800">State Transition Simulator Pro</h1>
                <p className="text-slate-600 text-sm mt-1">
                  Draw your NSS/GXS hypotheses. Drag to move nodes. Arrows create asymmetrical matrices. Colors determine edge weights (-1 to 1).
                </p>
              </div>

              <div className="w-full flex flex-col lg:flex-row gap-4 h-[60vh] mb-4">
                {/* Left Panel: Tools */}
                <div className="w-full lg:w-72 bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col overflow-y-auto">
                  <div className="mb-4 border-b border-slate-100 pb-3">
                    <h2 className="text-lg font-bold text-slate-800 flex items-center justify-between">
                      <span className="flex items-center">
                        <i className="fas fa-sliders-h mr-2 text-indigo-600"></i>
                        {editing === 'node' ? 'Edit Node' : editing === 'edge' ? 'Edit Edge' : 'Brush Settings'}
                      </span>
                    </h2>
                    <p className="text-xs text-slate-500 mt-1">{editing ? "Click canvas background to deselect." : "Sets defaults for next drawing."}</p>
                  </div>

                  {editing && (
                    <div className="mb-4 pb-4 border-b border-red-100">
                      <button onClick={deleteSelected} className="w-full py-2 bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 font-bold rounded flex items-center justify-center text-sm transition-colors border border-red-200">
                        <i className="fas fa-trash-alt mr-2"></i> Delete Selected {editing === 'node' ? 'Node' : 'Edge'}
                      </button>
                    </div>
                  )}

                  <div className={`mb-6 transition-opacity ${editing === 'edge' ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                    <h3 className="text-sm font-bold text-slate-700 mb-2">Node Style</h3>
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      {NODE_SHAPES.map(s => (
                        <button key={s} onClick={() => updateSelectedOrBrush('node', 'shape', s)} className={`px-2 py-1.5 text-xs rounded border capitalize ${activeNodeProps?.shape === s ? 'bg-indigo-50 border-indigo-500 text-indigo-700 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>{s}</button>
                      ))}
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {Object.keys(NODE_COLORS).map(c => (
                        <button key={c} onClick={() => updateSelectedOrBrush('node', 'color', c)} title={c} className={`w-8 h-8 rounded-full border-2 ${activeNodeProps?.color === c ? 'border-slate-800 scale-110' : 'border-slate-200'}`} style={{ backgroundColor: NODE_COLORS[c], borderColor: NODE_BORDER_COLORS[c] }}/>
                      ))}
                    </div>
                  </div>

                  <div className={`transition-opacity ${editing === 'node' ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                    <h3 className="text-sm font-bold text-slate-700 mb-2">Edge Style (Weight)</h3>
                    <div className="mb-3">
                      <label className="text-xs font-semibold text-slate-500 block mb-1">Color / Weight mapping:</label>
                      <div className="flex flex-col gap-1">
                        {Object.keys(EDGE_COLORS).map(c => (
                          <button key={c} onClick={() => updateSelectedOrBrush('edge', 'color', c)} className={`flex items-center text-xs px-2 py-1 rounded border ${activeEdgeProps?.color === c ? 'bg-slate-100 border-slate-400 font-bold' : 'border-transparent hover:bg-slate-50'}`}>
                            <span className="w-4 h-4 rounded-sm border border-slate-300 mr-2 inline-block" style={{ backgroundColor: EDGE_COLORS[c] }}></span>
                            <span className="capitalize flex-1 text-left">{c}</span>
                            <span className="text-slate-500 font-mono">{WEIGHT_MAP[c] > 0 ? `+${WEIGHT_MAP[c]}` : WEIGHT_MAP[c]}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      {EDGE_STYLES.map(s => (
                        <button key={s} onClick={() => updateSelectedOrBrush('edge', 'style', s)} className={`px-2 py-1.5 text-xs rounded border capitalize ${activeEdgeProps?.style === s ? 'bg-indigo-50 border-indigo-500 text-indigo-700 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>{s}</button>
                      ))}
                    </div>
                    <div>
                      <label className="text-xs font-semibold text-slate-500 block mb-1">Thickness: {activeEdgeProps?.thickness}</label>
                      <input type="range" min="1" max="10" value={activeEdgeProps?.thickness || 3} onChange={(e) => updateSelectedOrBrush('edge', 'thickness', parseInt(e.target.value))} className="w-full accent-indigo-600"/>
                    </div>
                  </div>
                </div>

                {/* Canvas Area */}
                <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-300 relative overflow-hidden flex flex-col">
                  <div className="absolute top-3 left-3 right-3 flex justify-between pointer-events-none z-10">
                    <div className="bg-white/90 backdrop-blur border border-slate-200 p-1.5 rounded-lg flex gap-1 shadow-sm pointer-events-auto">
                      <button onClick={exportPNG} className="px-2 py-1 text-xs flex items-center text-slate-700 hover:bg-slate-100 rounded font-medium transition">
                        <i className="fas fa-image mr-1 text-blue-600"></i> PNG
                      </button>
                      <button onClick={exportSVG} className="px-2 py-1 text-xs flex items-center text-slate-700 hover:bg-slate-100 rounded font-medium transition">
                        <i className="fas fa-file-code mr-1 text-orange-600"></i> SVG
                      </button>
                    </div>
                    <div className="bg-white/90 backdrop-blur border border-slate-200 p-1.5 rounded-lg flex gap-1 shadow-sm pointer-events-auto">
                      <button onClick={clearNetwork} className="px-2 py-1 text-xs flex items-center text-red-600 hover:bg-red-50 rounded font-medium transition">
                        <i className="fas fa-trash-alt mr-1"></i> Clear All
                      </button>
                    </div>
                  </div>

                  <svg 
                    ref={svgRef} onPointerDown={handleSvgPointerDown} onPointerMove={handleSvgPointerMove} onPointerUp={handleSvgPointerUp} onPointerLeave={handleSvgPointerUp}
                    className={`w-full h-full ${dragState.isDragging ? 'cursor-grabbing' : 'cursor-crosshair'}`} style={{ backgroundColor: '#f8fafc', touchAction: 'none' }}
                  >
                    <defs>
                      {Object.keys(EDGE_COLORS).map(colorName => {
                        const hex = EDGE_COLORS[colorName]; const safeName = colorName.replace(' ', '-');
                        return (<marker key={safeName} id={`arrow-${safeName}`} viewBox="0 0 10 10" refX="28" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={hex} /></marker>);
                      })}
                    </defs>
                    {edges.map((edge) => {
                      const sourceNode = nodes.find(n => n.id === edge.source); const targetNode = nodes.find(n => n.id === edge.target);
                      if (!sourceNode || !targetNode) return null;
                      const isSelected = selection.type === 'edge' && selection.id === edge.id;
                      const isDashed = edge.style.includes('dot'); const hasArrow = edge.style.includes('arrow');
                      const safeColorName = edge.color.replace(' ', '-');
                      return (
                        <g key={edge.id} className="cursor-pointer" onClick={(e) => handleEdgeClick(e, edge.id)}>
                          <line x1={sourceNode.x} y1={sourceNode.y} x2={targetNode.x} y2={targetNode.y} stroke="transparent" strokeWidth="20" />
                          <line x1={sourceNode.x} y1={sourceNode.y} x2={targetNode.x} y2={targetNode.y} stroke={EDGE_COLORS[edge.color] || edge.color} strokeWidth={edge.thickness} strokeDasharray={isDashed ? `${edge.thickness * 2},${edge.thickness * 2}` : 'none'} markerEnd={hasArrow ? `url(#arrow-${safeColorName})` : 'none'} />
                          {isSelected && <line x1={sourceNode.x} y1={sourceNode.y} x2={targetNode.x} y2={targetNode.y} stroke="#f59e0b" strokeWidth={edge.thickness + 4} strokeOpacity="0.4" />}
                        </g>
                      );
                    })}
                    {nodes.map((node) => {
                      const isSelected = selection.type === 'node' && selection.id === node.id;
                      return (
                        <g key={node.id} onPointerDown={(e) => handleNodePointerDown(e, node.id)} onPointerUp={(e) => handleNodePointerUp(e, node.id)} className={dragState.id === node.id && dragState.isDragging ? 'cursor-grabbing' : 'cursor-grab'}>
                          {isSelected && <circle cx={node.x} cy={node.y} r="26" fill="none" stroke="#f59e0b" strokeWidth="2" strokeDasharray="4 4" className="animate-spin-slow" />}
                          {renderShape(node.x, node.y, node.shape, node.color, isSelected)}
                          <text x={node.x} y={node.y} textAnchor="middle" dy=".3em" fill={['white', 'yellow', 'light red', 'light blue'].includes(node.color) ? '#1e293b' : 'white'} fontSize="11" fontWeight="bold" pointerEvents="none">{node.id}</text>
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>

              {/* Bottom Panel: Data & Math Views */}
              <div className="w-full h-80 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                
                {/* Tabs */}
                <div className="flex border-b border-slate-200 bg-slate-50">
                  <button onClick={() => setBottomTab('matrix')} className={`flex-1 py-3 text-sm font-bold flex items-center justify-center transition-colors ${bottomTab === 'matrix' ? 'bg-white text-indigo-700 border-b-2 border-indigo-600' : 'text-slate-500 hover:bg-slate-100'}`}>
                    <i className="fas fa-table mr-2"></i> Adjacency Matrix
                  </button>
                  <button onClick={() => setBottomTab('centrality')} className={`flex-1 py-3 text-sm font-bold flex items-center justify-center transition-colors ${bottomTab === 'centrality' ? 'bg-white text-indigo-700 border-b-2 border-indigo-600' : 'text-slate-500 hover:bg-slate-100'}`}>
                    <i className="fas fa-chart-line mr-2"></i> Centrality Metrics
                  </button>
                  <button onClick={() => setBottomTab('rcode')} className={`flex-1 py-3 text-sm font-bold flex items-center justify-center transition-colors ${bottomTab === 'rcode' ? 'bg-slate-900 text-emerald-400 border-b-2 border-emerald-500' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                    <i className="fas fa-code mr-2"></i> R Code Export
                  </button>
                </div>

                {/* Tab Content */}
                <div className="flex-1 overflow-auto relative flex flex-col">
                  
                  {/* Matrix View */}
                  {bottomTab === 'matrix' && (
                    <div className="p-4 flex-1 flex flex-col">
                      {nodes.length === 0 ? (
                        <div className="text-slate-400 text-center mt-10 text-sm flex flex-col items-center">
                          <i className="fas fa-table mb-2 opacity-50" style={{fontSize: '24px'}}></i> Stamp nodes to generate matrix.
                        </div>
                      ) : (
                        <>
                          <div className="flex justify-between items-center mb-3">
                            <h3 className="text-sm font-bold text-slate-700">Adjacency Matrix</h3>
                            <button onClick={exportMatrixCSV} className="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded transition-colors flex items-center border border-indigo-200 font-medium">
                              <i className="fas fa-download mr-1"></i> Export CSV
                            </button>
                          </div>
                          <div className="overflow-x-auto flex-1">
                            <table className="min-w-max border-collapse">
                              <thead>
                                <tr>
                                  <th className="p-2 border border-slate-200 bg-slate-100 text-slate-500 w-12 text-center text-xs font-bold"></th>
                                  {nodes.map(n => <th key={`th-${n.id}`} className="p-2 border border-slate-200 bg-slate-50 text-slate-700 w-12 text-center text-xs font-bold">V{n.id}</th>)}
                                </tr>
                              </thead>
                              <tbody>
                                {nodes.map((rowNode, i) => (
                                  <tr key={`tr-${rowNode.id}`}>
                                    <th className="p-2 border border-slate-200 bg-slate-50 text-slate-700 w-12 text-center text-xs font-bold">V{rowNode.id}</th>
                                    {nodes.map((colNode, j) => {
                                      const val = adjMatrix[i][j];
                                      let bgClass = "bg-white"; let textClass = "text-slate-400";
                                      if (val === 1) { bgClass = "bg-blue-800"; textClass = "text-white font-bold"; }
                                      else if (val === 0.7) { bgClass = "bg-blue-500"; textClass = "text-white font-bold"; }
                                      else if (val === 0.3) { bgClass = "bg-blue-200"; textClass = "text-blue-900 font-bold"; }
                                      else if (val === -0.3) { bgClass = "bg-red-200"; textClass = "text-red-900 font-bold"; }
                                      else if (val === -0.7) { bgClass = "bg-red-500"; textClass = "text-white font-bold"; }
                                      else if (val === -1) { bgClass = "bg-red-800"; textClass = "text-white font-bold"; }
                                      return (<td key={`td-${rowNode.id}-${colNode.id}`} className={`p-2 border border-slate-200 w-12 text-center text-xs transition-colors ${bgClass} ${textClass}`}>{val}</td>);
                                    })}
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  {/* Centrality Metrics View */}
                  {bottomTab === 'centrality' && (
                    <div className="p-4 flex flex-col h-full">
                      {nodes.length === 0 ? (
                        <div className="text-slate-400 text-center mt-10 text-sm flex flex-col items-center">
                          <i className="fas fa-chart-line mb-2 opacity-50" style={{fontSize: '24px'}}></i> Stamp nodes and connect edges to calculate centrality.
                        </div>
                      ) : (
                        <>
                          <div className="mb-3 bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-md text-xs flex items-start shadow-sm">
                            <i className="fas fa-exclamation-circle mr-2 mt-0.5 flex-shrink-0"></i>
                            <div className="flex-1">
                              <p className="mb-1">
                                <strong>Topological Approximation:</strong> Calculations here run live in JS and treat all edges as <em>unweighted topology</em> (Distance = 1) to avoid math errors from negative correlations. 
                                Graph is treated as <strong>{edges.some(e => e.style.includes('arrow')) ? 'Directed/Mixed' : 'Undirected'}</strong> based on your drawn arrows. 
                                For rigorous weighted metrics, please use the generated R code.
                              </p>
                            </div>
                            <button onClick={exportCentralityCSV} className="ml-4 flex-shrink-0 text-xs bg-white text-indigo-700 hover:bg-indigo-50 px-3 py-1.5 rounded transition-colors flex items-center border border-indigo-200 font-medium">
                              <i className="fas fa-download mr-1"></i> Export CSV
                            </button>
                          </div>
                          <div className="overflow-x-auto flex-1">
                            <table className="min-w-full border-collapse">
                              <thead>
                                <tr className="bg-slate-100 text-slate-600 text-xs text-left">
                                  <th className="p-2 border border-slate-200 font-bold text-center w-16">Node</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">In-Deg</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Out-Deg</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Total Deg</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Closeness</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Betweenness</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Eigenvector</th>
                                  <th className="p-2 border border-slate-200 font-bold text-center">Clustering</th>
                                </tr>
                              </thead>
                              <tbody>
                                {centralityData.map(node => {
                                  const isLightColor = ['white', 'yellow'].includes(node.color);
                                  const bgHex = NODE_COLORS[node.color] || '#cbd5e1';
                                  const textHex = isLightColor ? '#0f172a' : '#ffffff';
                                  
                                  return (
                                    <tr key={`cent-${node.id}`} className="hover:bg-slate-50 transition-colors">
                                      <td className="p-2 border border-slate-200 text-center text-xs font-bold" style={{ backgroundColor: bgHex, color: textHex }}>
                                        V{node.id}
                                      </td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-700">{node.inDeg}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-700">{node.outDeg}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-900 font-bold">{node.totalDeg}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-700">{node.closeness.toFixed(3)}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-700">{node.betweenness.toFixed(3)}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-emerald-700 font-bold">{node.eigen.toFixed(3)}</td>
                                      <td className="p-2 border border-slate-200 text-center text-xs font-mono text-slate-700">{node.clustering.toFixed(3)}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  {/* R Code View */}
                  {bottomTab === 'rcode' && (
                    <div className="absolute inset-0 bg-slate-900 p-4 overflow-auto">
                      <button onClick={() => navigator.clipboard.writeText(generateRCode())} className="absolute top-4 right-4 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded transition-colors flex items-center border border-slate-700">
                        <i className="fas fa-copy mr-1"></i> Copy R Code
                      </button>
                      <pre className="font-mono text-xs text-emerald-300 leading-relaxed pr-24 whitespace-pre-wrap">
                        {generateRCode()}
                      </pre>
                    </div>
                  )}

                </div>
              </div>
            </div>
          );
        }

        // 3. Mount the App to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
